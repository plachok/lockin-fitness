<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Generate Icons</title></head>
<body style="background:#080808;color:#e8ff00;font-family:monospace;padding:20px">
<h2>LOCK IN — Icon Generator</h2>
<p>กด Download แต่ละขนาด แล้วเซฟเป็น icon-192.png และ icon-512.png</p>

<canvas id="c192" width="192" height="192" style="display:block;margin:10px 0;border:1px solid #333"></canvas>
<a id="dl192" download="icon-192.png"><button style="background:#e8ff00;color:#000;padding:8px 16px;cursor:pointer;margin-bottom:20px">Download 192×192</button></a>

<canvas id="c512" width="512" height="512" style="display:block;margin:10px 0;border:1px solid #333"></canvas>
<a id="dl512" download="icon-512.png"><button style="background:#e8ff00;color:#000;padding:8px 16px;cursor:pointer">Download 512×512</button></a>

<script>
function drawIcon(canvas, size) {
  const ctx = canvas.getContext('2d');
  const s = size;
  
  // Background
  ctx.fillStyle = '#080808';
  ctx.fillRect(0, 0, s, s);
  
  // Rounded rect bg
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.roundRect(s*0.05, s*0.05, s*0.9, s*0.9, s*0.15);
  ctx.fill();
  
  // Accent bar top
  ctx.fillStyle = '#e8ff00';
  ctx.fillRect(s*0.05, s*0.05, s*0.9, s*0.04);
  
  // Text "LI" (Lock In)
  ctx.fillStyle = '#e8ff00';
  ctx.font = `bold ${s*0.42}px Arial Black, Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('LI', s/2, s*0.48);
  
  // Subtitle
  ctx.fillStyle = '#666';
  ctx.font = `${s*0.09}px monospace`;
  ctx.fillText('LOCK IN', s/2, s*0.76);
}

[192, 512].forEach(size => {
  const canvas = document.getElementById('c'+size);
  drawIcon(canvas, size);
  const dl = document.getElementById('dl'+size);
  dl.href = canvas.toDataURL('image/png');
});
</script>
</body>
</html>
